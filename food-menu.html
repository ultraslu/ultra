<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultra Flames</title>
    <link rel="icon" href="logo.ico" type="image/x-icon" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            background-size: cover;
            background-blend-mode: darken;
            color: #f1f1f1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .container {
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            margin-top: 0;
            margin-bottom: 30px;
        }

        a {
            display: block;
            margin: 10px auto;
            padding: 15px 25px;
            width: 200px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(255,255,255,0.08);
            color: #fff;
            transition: 0.3s ease;
        }

        a:hover {
            background: rgba(255,255,255,0.2);
        }

        .logo {
            width: 140px;
            height: 140px;
            background: url('logo.png') center/cover no-repeat;
            margin: 0 auto 20px auto;
        }

        .contact {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.6;
        }

        .call-link {
            color: #aaa;
            text-decoration: none;
        }

        .call-link:hover {
            text-decoration: underline;
        }

        .credit {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #ccc;
        }

        /* 🔥 Bigger designer button with better image visibility */
        .designer-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            padding: 14px 26px;
            height: 60px;
            border-radius: 35px;

            background: 
                linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
                url('imgs/7.jpeg') center 30% / cover no-repeat;

            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05rem;

            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            transition: 0.3s ease;
        }

        .designer-btn:hover {
            opacity: 0.9;
            transform: scale(1.06);
        }

        .designer-btn img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="logo"></div>
        <p>Bar • Food • Drinks • Vibes</p>

        <a href="index.html">Cocktail Menu</a>
        <a href="menu.html">Food Menu</a>

        <p class="contact">
            <strong>Located:</strong> Rodney Bay<br>
            <a href="tel:+17584608600" class="call-link">+1 (758) 460-8600</a><br>
            <strong>Hours:</strong> Wed–Mon, 5:00 PM – 1:00 AM<br>
            <em>Closed on Tuesdays</em>
        </p>
    </div>

    <!-- 🔥 Credit Section -->
    <p class="credit">
        Website designed and maintained by <p>
        <a href="https://instagram.com/cazvfa" target="_blank" class="designer-btn">
            cazvfa
            <img src="imgs/ig.png" alt="Instagram">
        </a></p>
    </p>

</body>
</html>
